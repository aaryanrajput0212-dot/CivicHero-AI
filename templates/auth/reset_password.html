{% extends "auth/auth_base.html" %}
{% block title %}Reset Password — CivicHero AI{% endblock %}

{% block form %}
<!-- Icon -->
<div class="w-16 h-16 bg-primary-bg rounded-2xl flex items-center justify-center mb-6">
  <i data-lucide="shield-check" class="w-8 h-8 text-primary"></i>
</div>

<h2 class="font-display text-3xl font-800 text-gray-900 mb-2">Set new password</h2>
<p class="text-gray-500 text-sm mb-8">Choose a strong password for your account.</p>

<form method="POST" action="/reset-password/{{ token }}" id="reset-form">

  <!-- New Password -->
  <div class="mb-2">
    <label class="block text-sm font-600 text-gray-700 mb-2">New Password</label>
    <div class="input-wrap">
      <i data-lucide="lock" class="input-icon w-4 h-4"></i>
      <input type="password" name="password" id="pw-new"
        class="form-input" placeholder="Min. 6 characters" required
        minlength="6" autocomplete="new-password" oninput="checkStrength(this.value)">
      <button type="button" class="input-icon-right" data-toggle-pw="pw-new">
        <i data-lucide="eye" class="w-4 h-4"></i>
      </button>
    </div>
    <!-- Strength meter -->
    <div class="flex gap-1 mt-2">
      <div class="strength-bar flex-1 bg-gray-200" id="s1"></div>
      <div class="strength-bar flex-1 bg-gray-200" id="s2"></div>
      <div class="strength-bar flex-1 bg-gray-200" id="s3"></div>
      <div class="strength-bar flex-1 bg-gray-200" id="s4"></div>
    </div>
    <p class="text-xs text-muted mt-1" id="strength-text">Enter a password</p>
  </div>

  <!-- Confirm Password -->
  <div class="mb-8">
    <label class="block text-sm font-600 text-gray-700 mb-2">Confirm New Password</label>
    <div class="input-wrap">
      <i data-lucide="lock" class="input-icon w-4 h-4"></i>
      <input type="password" name="confirm_password" id="pw-confirm2"
        class="form-input" placeholder="Re-enter new password" required
        autocomplete="new-password" oninput="checkMatch()">
      <button type="button" class="input-icon-right" data-toggle-pw="pw-confirm2">
        <i data-lucide="eye" class="w-4 h-4"></i>
      </button>
    </div>
    <p class="text-xs mt-1 hidden" id="match-msg2"></p>
  </div>

  <button type="submit" class="btn-primary" id="reset-btn">Reset Password</button>
</form>

<p class="text-center text-sm text-gray-600 mt-6">
  Remember it now?
  <a href="/login" class="text-primary font-700 hover:underline ml-1">Sign in</a>
</p>

<script>
function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 6)  score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9!@#$%^&*]/.test(pw)) score++;
  const bars = [document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
  const colors = ['#EF4444','#F59E0B','#3B82F6','#16A34A'];
  const labels = ['Too weak','Weak','Good','Strong 💪'];
  bars.forEach((b,i) => b.style.background = i < score ? colors[score-1] : '#E5E7EB');
  const txt = document.getElementById('strength-text');
  txt.textContent = pw.length===0 ? 'Enter a password' : (labels[score-1]||'Too weak');
  txt.style.color  = pw.length===0 ? '#94A3B8' : (colors[score-1]||'#EF4444');
}
function checkMatch() {
  const pw=document.getElementById('pw-new').value;
  const cpw=document.getElementById('pw-confirm2').value;
  const msg=document.getElementById('match-msg2');
  if(!cpw){msg.classList.add('hidden');return;}
  msg.classList.remove('hidden');
  if(pw===cpw){msg.textContent='✅ Passwords match';msg.style.color='#16A34A';}
  else{msg.textContent='❌ Passwords do not match';msg.style.color='#EF4444';}
}
document.getElementById('reset-form').addEventListener('submit',function(e){
  const pw=document.getElementById('pw-new').value;
  const cpw=document.getElementById('pw-confirm2').value;
  if(pw!==cpw){e.preventDefault();showToast('❌ Passwords do not match','#EF4444');return;}
  const btn=document.getElementById('reset-btn');
  btn.disabled=true;
  btn.innerHTML='<span style="display:flex;align-items:center;justify-content:center;gap:8px"><svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Resetting…</span>';
});
</script>
{% endblock %}
